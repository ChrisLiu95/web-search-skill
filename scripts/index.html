<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data, secret) => {
  try {
    let query = "";
    let maxResults = 5;

    try {
      const params = JSON.parse(data);
      query = params.query || params.text || params.search || "";
      maxResults = params.maxResults || params.max_results || 5;
    } catch (parseErr) {
      if (data && typeof data === 'string' && data.trim().length > 0) {
        query = data.trim();
      }
    }

    if (!query) {
      return JSON.stringify({ error: "No search query provided." });
    }

    if (!secret || secret.trim().length === 0) {
      return JSON.stringify({ error: "Tavily API key is missing. Please add it in skill settings." });
    }

    const apiKey = secret.trim();

    // Tavily API natively supports CORS - no proxy needed
    const response = await fetch("https://api.tavily.com/search", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        api_key: apiKey,
        query: query,
        max_results: maxResults,
        include_answer: true,
        include_raw_content: false,
        search_depth: "advanced"
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      return JSON.stringify({ error: `Tavily API error ${response.status}: ${errText.substring(0, 300)}` });
    }

    const respData = await response.json();

    let resultText = "";

    if (respData.answer) {
      resultText += `Summary: ${respData.answer}\n\n`;
    }

    resultText += `Search Results for "${query}":\n\n`;

    if (respData.results && respData.results.length > 0) {
      respData.results.forEach((r, i) => {
        resultText += `[${i + 1}] ${r.title}\n`;
        resultText += `Source: ${r.url}\n`;
        if (r.content) {
          const snippet = r.content.length > 600
            ? r.content.substring(0, 600) + "..."
            : r.content;
          resultText += `Summary: ${snippet}\n`;
        }
        resultText += "\n";
      });
    } else {
      resultText += "No results found.\n";
    }

    return JSON.stringify({ result: resultText });

  } catch (e) {
    return JSON.stringify({ error: `Search failed: ${e.message}` });
  }
};
</script>
</body>
</html>
