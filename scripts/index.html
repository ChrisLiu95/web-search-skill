<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data, secret) => {
  try {
    const params = JSON.parse(data);
    const query = params.query;
    const maxResults = params.maxResults || 5;

    if (!secret) {
      return JSON.stringify({
        error: "Tavily API key is required. Please provide it when prompted."
      });
    }

    if (!query) {
      return JSON.stringify({
        error: "No search query provided."
      });
    }

    const response = await fetch("https://api.tavily.com/search", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        api_key: secret,
        query: query,
        max_results: maxResults,
        include_answer: true,
        search_depth: "basic"
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      if (response.status === 401 || response.status === 403) {
        return JSON.stringify({
          error: "Invalid Tavily API key. Please check your key at https://tavily.com"
        });
      }
      return JSON.stringify({
        error: `Search failed (HTTP ${response.status}): ${errText}`
      });
    }

    const data_resp = await response.json();

    // Format results for the LLM
    let resultText = "";

    if (data_resp.answer) {
      resultText += `**Summary:** ${data_resp.answer}\n\n`;
    }

    resultText += `**Search Results for "${query}":**\n\n`;

    if (data_resp.results && data_resp.results.length > 0) {
      data_resp.results.forEach((r, i) => {
        resultText += `${i + 1}. **${r.title}**\n`;
        resultText += `   ${r.url}\n`;
        if (r.content) {
          // Truncate long snippets
          const snippet = r.content.length > 300 
            ? r.content.substring(0, 300) + "..." 
            : r.content;
          resultText += `   ${snippet}\n`;
        }
        resultText += "\n";
      });
    } else {
      resultText += "No results found.\n";
    }

    return JSON.stringify({
      result: resultText
    });

  } catch (e) {
    console.error(e);
    return JSON.stringify({
      error: `Search failed: ${e.message}`
    });
  }
};
</script>
</body>
</html>
