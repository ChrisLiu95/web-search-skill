<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data, secret) => {
  try {
    let query = "test";
    let maxResults = 5;

    try {
      const params = JSON.parse(data);
      query = params.query || params.text || params.search || "test";
      maxResults = params.maxResults || params.max_results || 5;
    } catch (parseErr) {
      if (data && typeof data === 'string' && data.length > 0) {
        query = data;
      }
    }

    if (!secret || secret.trim().length === 0) {
      return JSON.stringify({ error: "Tavily API key is missing. Please add it in skill settings." });
    }

    const apiKey = secret.trim();

    // Use CORS proxy to bypass cross-origin restrictions in WebView
    const targetUrl = "https://api.tavily.com/search";
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

    const response = await fetch(proxyUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        api_key: apiKey,
        query: query,
        max_results: maxResults,
        include_answer: true,
        search_depth: "basic"
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      return JSON.stringify({ error: `HTTP ${response.status}: ${errText.substring(0, 500)}` });
    }

    const respData = await response.json();

    let resultText = "";

    if (respData.answer) {
      resultText += `**Summary:** ${respData.answer}\n\n`;
    }

    resultText += `**Search Results for "${query}":**\n\n`;

    if (respData.results && respData.results.length > 0) {
      respData.results.forEach((r, i) => {
        resultText += `[${i + 1}] ${r.title}\n`;
        resultText += `Source: ${r.url}\n`;
        if (r.content) {
          const snippet = r.content.length > 300
            ? r.content.substring(0, 300) + "..."
            : r.content;
          resultText += `Summary: ${snippet}\n`;
        }
        resultText += "\n";
      });
    } else {
      resultText += "No results found.\n";
    }

    return JSON.stringify({ result: resultText });

  } catch (e) {
    return JSON.stringify({ error: `Exception: ${e.message}` });
  }
};
</script>
</body>
</html>
